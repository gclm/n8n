name: 'Docker: Build and Push (CHS tags only)'

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  NODE_VERSION: '24.13.1'

on:
  push:
    tags:
      - '*chs*'

jobs:
  build-and-push-docker:
    strategy:
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - platform: arm64
            runner: ubuntu-latest
            docker_platform: linux/arm64

    name: Build and Push Docker Images (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    outputs:
      image_ref: ${{ steps.determine-tags.outputs.n8n_primary_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Turborepo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build n8n for Docker
        run: pnpm build:n8n

      - name: Set build context
        id: context
        run: |
          REF_NAME="${GITHUB_REF##*/}"
          {
            echo "release_type=custom"
            echo "n8n_version=${REF_NAME}"
            echo "push_enabled=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Determine Docker tags
        id: determine-tags
        run: |
          REF_NAME="${GITHUB_REF##*/}"
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_N8N="ghcr.io/${OWNER_LC}/n8n"
          GHCR_RUNNERS="ghcr.io/${OWNER_LC}/runners"
          DOCKER_N8N="${{ secrets.DOCKER_USERNAME }}/n8n"
          DOCKER_RUNNERS="${{ secrets.DOCKER_USERNAME }}/runners"
          PLATFORM="${{ matrix.platform }}"

          # n8n / runners / distroless tags (single redirect for shellcheck SC2129)
          {
            echo "n8n_tags<<EOF"
            echo "${GHCR_N8N}:${REF_NAME}-${PLATFORM}"
            echo "${DOCKER_N8N}:${REF_NAME}-${PLATFORM}"
            echo "${GHCR_N8N}:latest-${PLATFORM}"
            echo "${DOCKER_N8N}:latest-${PLATFORM}"
            echo "EOF"
            echo "n8n_primary_tag=${GHCR_N8N}:${REF_NAME}"
            echo "runners_tags<<EOF"
            echo "${GHCR_RUNNERS}:${REF_NAME}-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:${REF_NAME}-${PLATFORM}"
            echo "${GHCR_RUNNERS}:latest-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:latest-${PLATFORM}"
            echo "EOF"
            echo "runners_distroless_tags<<EOF"
            echo "${GHCR_RUNNERS}:${REF_NAME}-distroless-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:${REF_NAME}-distroless-${PLATFORM}"
            echo "${GHCR_RUNNERS}:latest-distroless-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:latest-distroless-${PLATFORM}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push n8n image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/images/n8n/Dockerfile
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            N8N_VERSION=${{ steps.context.outputs.n8n_version }}
            N8N_RELEASE_TYPE=custom
          platforms: ${{ matrix.docker_platform }}
          provenance: false
          push: true
          tags: ${{ steps.determine-tags.outputs.n8n_tags }}

      - name: Build and push runners image (Alpine)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/images/runners/Dockerfile
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            N8N_VERSION=${{ steps.context.outputs.n8n_version }}
            N8N_RELEASE_TYPE=custom
          platforms: ${{ matrix.docker_platform }}
          provenance: false
          push: true
          tags: ${{ steps.determine-tags.outputs.runners_tags }}

      - name: Build and push runners image (distroless)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/images/runners/Dockerfile.distroless
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            N8N_VERSION=${{ steps.context.outputs.n8n_version }}
            N8N_RELEASE_TYPE=custom
          platforms: ${{ matrix.docker_platform }}
          provenance: false
          push: true
          tags: ${{ steps.determine-tags.outputs.runners_distroless_tags }}

  create_multi_arch_manifest:
    name: Create Multi-Arch Manifest
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create GHCR multi-arch manifests
        run: |
          REF_NAME="${GITHUB_REF##*/}"
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_N8N="ghcr.io/${OWNER_LC}/n8n"
          GHCR_RUNNERS="ghcr.io/${OWNER_LC}/runners"

          docker buildx imagetools create \
            --tag "${GHCR_N8N}:${REF_NAME}" \
            "${GHCR_N8N}:${REF_NAME}-amd64" \
            "${GHCR_N8N}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_N8N}:latest" \
            "${GHCR_N8N}:latest-amd64" \
            "${GHCR_N8N}:latest-arm64"

          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:${REF_NAME}" \
            "${GHCR_RUNNERS}:${REF_NAME}-amd64" \
            "${GHCR_RUNNERS}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:latest" \
            "${GHCR_RUNNERS}:latest-amd64" \
            "${GHCR_RUNNERS}:latest-arm64"

          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:${REF_NAME}-distroless" \
            "${GHCR_RUNNERS}:${REF_NAME}-distroless-amd64" \
            "${GHCR_RUNNERS}:${REF_NAME}-distroless-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:latest-distroless" \
            "${GHCR_RUNNERS}:latest-distroless-amd64" \
            "${GHCR_RUNNERS}:latest-distroless-arm64"

      - name: Create DockerHub multi-arch manifests
        run: |
          REF_NAME="${GITHUB_REF##*/}"
          DH_N8N="${{ secrets.DOCKER_USERNAME }}/n8n"
          DH_RUNNERS="${{ secrets.DOCKER_USERNAME }}/runners"

          docker buildx imagetools create \
            --tag "${DH_N8N}:${REF_NAME}" \
            "${DH_N8N}:${REF_NAME}-amd64" \
            "${DH_N8N}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${DH_N8N}:latest" \
            "${DH_N8N}:latest-amd64" \
            "${DH_N8N}:latest-arm64"

          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:${REF_NAME}" \
            "${DH_RUNNERS}:${REF_NAME}-amd64" \
            "${DH_RUNNERS}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:latest" \
            "${DH_RUNNERS}:latest-amd64" \
            "${DH_RUNNERS}:latest-arm64"

          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:${REF_NAME}-distroless" \
            "${DH_RUNNERS}:${REF_NAME}-distroless-amd64" \
            "${DH_RUNNERS}:${REF_NAME}-distroless-arm64"
          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:latest-distroless" \
            "${DH_RUNNERS}:latest-distroless-amd64" \
            "${DH_RUNNERS}:latest-distroless-arm64"
