name: 'Docker: Build and Push (CHS tags only)'

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  NODE_VERSION: '24.15.0'
  # 推 tag 时用 tag 名；手动 workflow_dispatch 时用输入的 release_tag
  CHS_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

on:
  push:
    tags:
      - '*chs*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Docker / GitHub Release 标签（须含 chs，例如 1.114.0-chs.1）'
        required: true
        type: string
      source_ref:
        description: '检出源码的 Git ref（分支 / tag / SHA）。留空=本次运行所选分支的 HEAD'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-docker:
    strategy:
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - platform: arm64
            runner: ubuntu-latest
            docker_platform: linux/arm64

    name: Build and Push Docker Images (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Validate manual inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          case "${RELEASE_TAG}" in *chs*|*CHS*) ;; *)
            echo "::error title=Invalid release_tag::release_tag 必须包含 chs（与 push tag 触发规则一致）"
            exit 1
            ;;
          esac

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.source_ref != '' && inputs.source_ref || github.sha) || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Verify Node.js version
        run: |
          ACTUAL="$(node --version)"
          if [ "${ACTUAL#v}" != "${NODE_VERSION}" ]; then
            echo "::error::Expected Node ${NODE_VERSION}, got ${ACTUAL}"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Turborepo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build n8n for Docker
        run: pnpm build:n8n

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set build context
        id: context
        env:
          REF_NAME: ${{ env.CHS_RELEASE_TAG }}
        run: |
          {
            echo "release_type=custom"
            echo "n8n_version=${REF_NAME}"
            echo "push_enabled=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Determine Docker tags
        id: determine-tags
        env:
          REF_NAME: ${{ env.CHS_RELEASE_TAG }}
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_N8N="ghcr.io/${OWNER_LC}/n8n"
          GHCR_RUNNERS="ghcr.io/${OWNER_LC}/runners"
          DOCKER_N8N="${{ secrets.DOCKER_USERNAME }}/n8n"
          DOCKER_RUNNERS="${{ secrets.DOCKER_USERNAME }}/runners"
          PLATFORM="${{ matrix.platform }}"

          # n8n / runners / distroless tags (single redirect for shellcheck SC2129)
          {
            echo "n8n_tags<<EOF"
            echo "${GHCR_N8N}:${REF_NAME}-${PLATFORM}"
            echo "${DOCKER_N8N}:${REF_NAME}-${PLATFORM}"
            echo "${GHCR_N8N}:latest-${PLATFORM}"
            echo "${DOCKER_N8N}:latest-${PLATFORM}"
            echo "EOF"
            echo "n8n_primary_tag=${GHCR_N8N}:${REF_NAME}"
            echo "runners_tags<<EOF"
            echo "${GHCR_RUNNERS}:${REF_NAME}-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:${REF_NAME}-${PLATFORM}"
            echo "${GHCR_RUNNERS}:latest-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:latest-${PLATFORM}"
            echo "EOF"
            echo "runners_distroless_tags<<EOF"
            echo "${GHCR_RUNNERS}:${REF_NAME}-distroless-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:${REF_NAME}-distroless-${PLATFORM}"
            echo "${GHCR_RUNNERS}:latest-distroless-${PLATFORM}"
            echo "${DOCKER_RUNNERS}:latest-distroless-${PLATFORM}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to Docker registries
        uses: ./.github/actions/docker-registry-login
        with:
          login-ghcr: true
          login-dockerhub: true
          dockerhub-username: ${{ secrets.DOCKER_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push n8n image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/images/n8n/Dockerfile
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            N8N_VERSION=${{ steps.context.outputs.n8n_version }}
            N8N_RELEASE_TYPE=custom
          platforms: ${{ matrix.docker_platform }}
          provenance: false
          push: true
          tags: ${{ steps.determine-tags.outputs.n8n_tags }}

      - name: Build and push runners image (Alpine)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/images/runners/Dockerfile
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            N8N_VERSION=${{ steps.context.outputs.n8n_version }}
            N8N_RELEASE_TYPE=custom
          platforms: ${{ matrix.docker_platform }}
          provenance: false
          push: true
          tags: ${{ steps.determine-tags.outputs.runners_tags }}

      - name: Build and push runners image (distroless)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/images/runners/Dockerfile.distroless
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            N8N_VERSION=${{ steps.context.outputs.n8n_version }}
            N8N_RELEASE_TYPE=custom
          platforms: ${{ matrix.docker_platform }}
          provenance: false
          push: true
          tags: ${{ steps.determine-tags.outputs.runners_distroless_tags }}

  create_multi_arch_manifest:
    name: Create Multi-Arch Manifest
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker registries
        uses: ./.github/actions/docker-registry-login
        with:
          login-ghcr: true
          login-dockerhub: true
          dockerhub-username: ${{ secrets.DOCKER_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create GHCR multi-arch manifests
        env:
          REF_NAME: ${{ env.CHS_RELEASE_TAG }}
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_N8N="ghcr.io/${OWNER_LC}/n8n"
          GHCR_RUNNERS="ghcr.io/${OWNER_LC}/runners"

          docker buildx imagetools create \
            --tag "${GHCR_N8N}:${REF_NAME}" \
            "${GHCR_N8N}:${REF_NAME}-amd64" \
            "${GHCR_N8N}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_N8N}:latest" \
            "${GHCR_N8N}:latest-amd64" \
            "${GHCR_N8N}:latest-arm64"

          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:${REF_NAME}" \
            "${GHCR_RUNNERS}:${REF_NAME}-amd64" \
            "${GHCR_RUNNERS}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:latest" \
            "${GHCR_RUNNERS}:latest-amd64" \
            "${GHCR_RUNNERS}:latest-arm64"

          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:${REF_NAME}-distroless" \
            "${GHCR_RUNNERS}:${REF_NAME}-distroless-amd64" \
            "${GHCR_RUNNERS}:${REF_NAME}-distroless-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_RUNNERS}:latest-distroless" \
            "${GHCR_RUNNERS}:latest-distroless-amd64" \
            "${GHCR_RUNNERS}:latest-distroless-arm64"

      - name: Create DockerHub multi-arch manifests
        env:
          REF_NAME: ${{ env.CHS_RELEASE_TAG }}
        run: |
          DH_N8N="${{ secrets.DOCKER_USERNAME }}/n8n"
          DH_RUNNERS="${{ secrets.DOCKER_USERNAME }}/runners"

          docker buildx imagetools create \
            --tag "${DH_N8N}:${REF_NAME}" \
            "${DH_N8N}:${REF_NAME}-amd64" \
            "${DH_N8N}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${DH_N8N}:latest" \
            "${DH_N8N}:latest-amd64" \
            "${DH_N8N}:latest-arm64"

          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:${REF_NAME}" \
            "${DH_RUNNERS}:${REF_NAME}-amd64" \
            "${DH_RUNNERS}:${REF_NAME}-arm64"
          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:latest" \
            "${DH_RUNNERS}:latest-amd64" \
            "${DH_RUNNERS}:latest-arm64"

          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:${REF_NAME}-distroless" \
            "${DH_RUNNERS}:${REF_NAME}-distroless-amd64" \
            "${DH_RUNNERS}:${REF_NAME}-distroless-arm64"
          docker buildx imagetools create \
            --tag "${DH_RUNNERS}:latest-distroless" \
            "${DH_RUNNERS}:latest-distroless-amd64" \
            "${DH_RUNNERS}:latest-distroless-arm64"

  publish_github_release:
    name: Publish GitHub Release
    needs: create_multi_arch_manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create or skip GitHub Release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.CHS_RELEASE_TAG }}
          REPO: ${{ github.repository }}
          OWNER_LC: ${{ github.repository_owner }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          OWNER_LOWER="$(printf '%s' "${OWNER_LC}" | tr '[:upper:]' '[:lower:]')"
          NOTES_FILE="$(mktemp)"
          trap 'rm -f "${NOTES_FILE}"' EXIT
          {
            echo 'CHS Docker images for this tag (multi-arch manifest lists):'
            echo
            echo '### GHCR'
            echo "- \`ghcr.io/${OWNER_LOWER}/n8n:${TAG}\`"
            echo "- \`ghcr.io/${OWNER_LOWER}/runners:${TAG}\`"
            echo "- \`ghcr.io/${OWNER_LOWER}/runners:${TAG}-distroless\`"
            echo
            echo '### Docker Hub'
            echo "- \`${DOCKER_USER}/n8n:${TAG}\`"
            echo "- \`${DOCKER_USER}/runners:${TAG}\`"
            echo "- \`${DOCKER_USER}/runners:${TAG}-distroless\`"
          } > "${NOTES_FILE}"

          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists on ${REPO}, skipping create."
            exit 0
          fi

          BODY="$(cat "${NOTES_FILE}")"
          jq -n \
            --arg tag "${TAG}" \
            --arg name "${TAG}" \
            --arg body "${BODY}" \
            '{tag_name: $tag, name: $name, body: $body, generate_release_notes: true, draft: false, prerelease: false}' \
            | gh api --method POST "repos/${REPO}/releases" --input -
