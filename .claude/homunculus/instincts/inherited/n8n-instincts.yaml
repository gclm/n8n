# N8n Workflow Add Or Modify Database Table

## Action

Follow the add-or-modify-database-table workflow:
1. Create or update entity file in packages/@n8n/db/src/entities/.
2. Add or update migration in packages/@n8n/db/src/migrations/common/ and database-specific folders.
3. Update repository in packages/@n8n/db/src/repositories/.
4. Update index files for entities and repositories.
5. Add or update related tests.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: packages/@n8n/db/src/entities/*.ts, packages/@n8n/db/src/migrations/common/*.ts, packages/@n8n/db/src/migrations/postgresdb/index.ts

